site_name: MS Community Plugins
site_description: Free open-source Milestone XProtect plugins, Smart Client extensions, device drivers, and VMS tools — community-built add-ons for video surveillance and security management
site_url: https://cacsjep.github.io/mscp/
repo_url: https://github.com/Cacsjep/mscp
repo_name: Cacsjep/mscp

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: slate
    primary: blue
    accent: light blue
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/css/custom.css

nav:
  - Home: index.md
  - Plugins & Drivers: plugins/index.md
  - Download: getting-started/installation.md
  - Plugins:
    - Admin Plugins:
      - Auditor: plugins/admin/auditor.md
      - Certificate Watchdog: plugins/admin/cert-watchdog.md
      - HTTP Requests: plugins/admin/http-requests.md
      - RTMP Streamer: plugins/admin/rtmp-streamer.md
    - Smart Client:
      - Flex Viewer: plugins/smart-client/flexview.md
      - Monitor RTMP Streamer: plugins/smart-client/monitor-rtmp-streamer.md
      - Notepad: plugins/smart-client/notepad.md
      - RDP: plugins/smart-client/rdp.md
      - Remote Control: plugins/smart-client/sc-remote-control.md
      - Smart Bar: plugins/smart-client/smartbar.md
      - Snapshot Report: plugins/smart-client/snapreport.md
      - Timelapse: plugins/smart-client/timelapse.md
      - View Carousel: plugins/smart-client/view-carousel.md
      - Web View: plugins/smart-client/webview.md
      - Weather: plugins/smart-client/weather.md
  - Device Drivers:
    - RTMP Push Driver: plugins/device-drivers/rtmp.md
    - RTSP Driver: plugins/device-drivers/rtsp.md
  - Reporting Bugs: support/reporting-bugs.md
  - Changelog: support/changelog.md
  - Third-Party Notices: support/third-party-notices.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Cacsjep/mscp
    - icon: fontawesome/brands/discord
      link: https://discord.gg/EU2HX4Qc

copyright: >
  MSC Community Plugins | Not affiliated with or supported by Milestone Systems.
  XProtect&trade; is a trademark of Milestone Systems A/S.
