<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSC Community Plugins</title>
<script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden}
  body{background:#080c14}
  canvas{position:fixed;top:0;left:0;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv = document.getElementById('c');
const c = cv.getContext('2d');
let W, H, cx, cy;

function resize() {
  W = cv.width = innerWidth;
  H = cv.height = innerHeight;
  cx = W / 2;
  cy = H / 2;
}
resize();
addEventListener('resize', resize);

// ── Circuit board: nodes + connections ──
const nodes = [];
const edges = [];
const SPACING = 70;
const JITTER = 12;

// Grid of nodes with slight randomness
for (let y = -SPACING; y < H + SPACING; y += SPACING) {
  for (let x = -SPACING; x < W + SPACING; x += SPACING) {
    const nx = x + (Math.random() - 0.5) * JITTER;
    const ny = y + (Math.random() - 0.5) * JITTER;
    const dist = Math.hypot(nx - cx, ny - cy);
    // Skip center area for header space
    const inCenter = Math.abs(nx - cx) < W * 0.18 && Math.abs(ny - cy) < H * 0.12;
    nodes.push({
      x: nx, y: ny, dist,
      size: 1.5 + Math.random() * 1.5,
      alpha: 0,
      targetAlpha: inCenter ? 0.02 : 0.06 + Math.random() * 0.06,
      phase: Math.random() * Math.PI * 2,
      inCenter,
      lit: 0,
    });
  }
}

// Connect nearby nodes
for (let i = 0; i < nodes.length; i++) {
  for (let j = i + 1; j < nodes.length; j++) {
    const d = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
    if (d < SPACING * 1.3 && Math.random() > 0.15) {
      edges.push({ a: i, b: j, alpha: 0, targetAlpha: 0.04 + Math.random() * 0.03 });
    }
  }
}

// ── Data packets: travel along edges ──
const packets = [];

function spawnPacket() {
  const edge = edges[Math.floor(Math.random() * edges.length)];
  const a = nodes[edge.a];
  const b = nodes[edge.b];
  if (a.inCenter && b.inCenter) return;

  const forward = Math.random() > 0.5;
  packets.push({
    edge,
    from: forward ? edge.a : edge.b,
    to: forward ? edge.b : edge.a,
    t: 0,
    speed: 0.008 + Math.random() * 0.012,
    size: 2 + Math.random() * 2,
    bright: 0.5 + Math.random() * 0.5,
  });
}

// ── Signal bursts: radiate from a node outward ──
const bursts = [];

function spawnBurst() {
  const node = nodes[Math.floor(Math.random() * nodes.length)];
  if (node.inCenter) return;
  bursts.push({
    x: node.x, y: node.y,
    radius: 0,
    maxRadius: 120 + Math.random() * 100,
    speed: 1.5 + Math.random(),
    alpha: 0.25 + Math.random() * 0.15,
  });
}

// ── Intro: fade in from center outward ──
const maxDist = Math.hypot(cx, cy);
let introT = 0;

let lastPacket = 0;
let lastBurst = 0;
let t = 0;

function draw(ts) {
  t = ts * 0.001;
  introT = Math.min(introT + 0.008, 1);
  const introReach = introT * maxDist * 1.4;

  c.clearRect(0, 0, W, H);

  // BG
  const bg = c.createRadialGradient(cx, cy, 0, cx, cy, W * 0.6);
  bg.addColorStop(0, '#0c1525');
  bg.addColorStop(1, '#080c14');
  c.fillStyle = bg;
  c.fillRect(0, 0, W, H);

  // Intro fade
  for (const n of nodes) {
    if (n.dist < introReach) {
      n.alpha += (n.targetAlpha - n.alpha) * 0.04;
    }
  }
  for (const e of edges) {
    const avgDist = (nodes[e.a].dist + nodes[e.b].dist) / 2;
    if (avgDist < introReach) {
      e.alpha += (e.targetAlpha - e.alpha) * 0.04;
    }
  }

  // Update burst influence on nodes
  for (const n of nodes) {
    n.lit *= 0.95;
    for (const b of bursts) {
      const d = Math.hypot(n.x - b.x, n.y - b.y);
      if (Math.abs(d - b.radius) < 30) {
        const str = (1 - Math.abs(d - b.radius) / 30) * b.alpha * (1 - b.radius / b.maxRadius);
        n.lit = Math.min(1, n.lit + str);
      }
    }
  }

  // Draw edges
  c.lineCap = 'round';
  for (const e of edges) {
    if (e.alpha <= 0.001) continue;
    const a = nodes[e.a], b = nodes[e.b];
    const pulse = Math.sin(t * 0.5 + (a.phase + b.phase) * 0.5) * 0.3 + 0.7;
    const litBoost = (a.lit + b.lit) * 0.15;
    const al = (e.alpha * pulse + litBoost) * Math.min(introT * 3, 1);

    c.beginPath();
    c.moveTo(a.x, a.y);
    c.lineTo(b.x, b.y);
    c.strokeStyle = `rgba(40,100,180,${Math.min(al, 0.2)})`;
    c.lineWidth = 0.8;
    c.stroke();
  }

  // Draw nodes
  for (const n of nodes) {
    if (n.alpha <= 0.001) continue;
    const pulse = Math.sin(t * 0.8 + n.phase) * 0.3 + 0.7;
    const al = (n.alpha * pulse + n.lit * 0.5) * Math.min(introT * 3, 1);
    const r = n.size * (1 + n.lit * 0.8);

    // Glow when lit
    if (n.lit > 0.1) {
      c.beginPath();
      c.arc(n.x, n.y, r + 6, 0, Math.PI * 2);
      c.fillStyle = `rgba(60,140,255,${n.lit * 0.08})`;
      c.fill();
    }

    c.beginPath();
    c.arc(n.x, n.y, r, 0, Math.PI * 2);
    c.fillStyle = `rgba(70,150,255,${Math.min(al + n.lit * 0.3, 0.7)})`;
    c.fill();
  }

  // Draw packets
  for (let i = packets.length - 1; i >= 0; i--) {
    const p = packets[i];
    p.t += p.speed;
    if (p.t >= 1) {
      // Light up destination node
      nodes[p.to].lit = Math.min(1, nodes[p.to].lit + 0.6);
      packets.splice(i, 1);
      continue;
    }

    const a = nodes[p.from], b = nodes[p.to];
    const px = a.x + (b.x - a.x) * p.t;
    const py = a.y + (b.y - a.y) * p.t;

    // Trail
    const trail = 5;
    for (let j = 1; j <= trail; j++) {
      const tt = Math.max(0, p.t - j * 0.04);
      const tx = a.x + (b.x - a.x) * tt;
      const ty = a.y + (b.y - a.y) * tt;
      c.beginPath();
      c.arc(tx, ty, p.size * (1 - j / trail) * 0.7, 0, Math.PI * 2);
      c.fillStyle = `rgba(80,160,255,${p.bright * 0.15 * (1 - j / trail)})`;
      c.fill();
    }

    // Head
    c.beginPath();
    c.arc(px, py, p.size, 0, Math.PI * 2);
    c.fillStyle = `rgba(120,190,255,${p.bright * 0.8})`;
    c.fill();

    // Glow
    c.shadowColor = 'rgba(80,160,255,0.7)';
    c.shadowBlur = 10;
    c.beginPath();
    c.arc(px, py, p.size * 0.5, 0, Math.PI * 2);
    c.fillStyle = `rgba(180,220,255,${p.bright * 0.9})`;
    c.fill();
    c.shadowBlur = 0;
  }

  // Draw bursts
  for (let i = bursts.length - 1; i >= 0; i--) {
    const b = bursts[i];
    b.radius += b.speed;
    if (b.radius > b.maxRadius) { bursts.splice(i, 1); continue; }
    const fade = 1 - b.radius / b.maxRadius;
    c.beginPath();
    c.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
    c.strokeStyle = `rgba(60,140,255,${b.alpha * fade * 0.3})`;
    c.lineWidth = 2;
    c.stroke();
  }

  // Spawn
  if (introT > 0.3 && ts - lastPacket > 30) {
    spawnPacket();
    lastPacket = ts;
  }
  if (introT > 0.5 && ts - lastBurst > 3000 + Math.random() * 2000) {
    spawnBurst();
    lastBurst = ts;
  }

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
