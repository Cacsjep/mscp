name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Generate build matrix from plugins.json ──
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      names: ${{ steps.gen.outputs.names }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: gen
        shell: pwsh
        run: |
          $plugins = Get-Content plugins.json -Raw | ConvertFrom-Json
          $include = @()
          $names = @()

          foreach ($p in $plugins) {
            $project = if ($p.project) { $p.project } else { "$($p.name).csproj" }
            $platform = if ($p.platform) { $p.platform } else { 'AnyCPU' }
            $outputPath = if ($p.outputPath) { $p.outputPath }
                          elseif ($platform -eq 'x64') { 'bin/x64/Release/net48' }
                          else { 'bin/Release/net48' }

            # Build project list (main + extras)
            $projects = @("$($p.path)/$project" -replace '/', '\')
            if ($p.extraProjects) {
              foreach ($ep in $p.extraProjects) {
                $projects += ($ep -replace '/', '\')
              }
            }

            $include += @{
              name       = $p.name
              projects   = $projects -join ';'
              platform   = $platform
              stage_from = ("$($p.path)/$outputPath" -replace '/', '\')
              stage_to   = $p.name
            }
            $names += $p.name
          }

          $matrix = @{ include = $include } | ConvertTo-Json -Depth 5 -Compress
          $namesList = $names | ConvertTo-Json -Compress

          "matrix=$matrix" >> $env:GITHUB_OUTPUT
          "names=$namesList" >> $env:GITHUB_OUTPUT

  # ── Matrix build: each plugin builds in parallel ──
  build:
    needs: setup
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2.0.0

      - name: Setup NuGet
        uses: NuGet/setup-nuget@d105a947828025cd7a980103c35ba2bfae586d0f # v2.0.2

      - name: Restore NuGet packages
        run: nuget restore MSCPlugins.sln

      - name: Build ${{ matrix.name }}
        run: |
          $projects = "${{ matrix.projects }}" -split ";"
          foreach ($proj in $projects) {
            msbuild $proj /p:Configuration=Release /p:Platform="${{ matrix.platform }}" /p:CIBuild=true
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
        shell: pwsh

      - name: Stage ${{ matrix.name }}
        run: |
          New-Item -ItemType Directory -Path staging\${{ matrix.stage_to }} -Force
          Copy-Item -Path "${{ matrix.stage_from }}\*" -Destination staging\${{ matrix.stage_to }} -Recurse
        shell: pwsh

      - name: Extra staging for ${{ matrix.name }}
        shell: pwsh
        run: |
          $plugins = Get-Content plugins.json -Raw | ConvertFrom-Json
          $p = $plugins | Where-Object { $_.name -eq '${{ matrix.name }}' }
          if ($p.extraStagingDirs) {
            foreach ($dir in $p.extraStagingDirs) {
              $src = $dir -replace '/', '\'
              Copy-Item -Path "$src\*" -Destination "staging\${{ matrix.stage_to }}" -Recurse -Force
              Write-Host "Extra staging dir: $src"
            }
          }
          if ($p.extraStagingFiles) {
            foreach ($file in $p.extraStagingFiles) {
              $src = $file -replace '/', '\'
              Copy-Item -Path $src -Destination "staging\${{ matrix.stage_to }}" -Force
              Write-Host "Extra staging file: $src"
            }
          }

      - name: Create ZIP
        run: Compress-Archive -Path staging\${{ matrix.stage_to }} -DestinationPath ${{ matrix.name }}-${{ github.ref_name }}.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}-${{ github.ref_name }}.zip

  # ── Collect all artifacts, build unified installer, create release ──
  release:
    needs: [setup, build]
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2.0.0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Extract staging directories
        shell: pwsh
        run: |
          $names = '${{ needs.setup.outputs.names }}' | ConvertFrom-Json
          foreach ($name in $names) {
            $zip = Get-ChildItem "artifacts\$name\*.zip" | Select-Object -First 1
            Expand-Archive -Path $zip.FullName -DestinationPath staging -Force
          }

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.*
          wix extension add WixToolset.UI.wixext/5 -g
          wix extension add WixToolset.Util.wixext/5 -g

      - name: Generate WiX components
        shell: pwsh
        run: |
          $stagingRoot = (Resolve-Path 'staging').Path
          pwsh installer/generate-wix.ps1 -StagingRoot $stagingRoot

      - name: Build installer custom actions
        shell: pwsh
        run: |
          msbuild installer\customactions\InstallerCustomActions.csproj `
            /restore `
            /p:Configuration=Release `
            /t:Rebuild `
            /v:minimal

      - name: Build MSI installer
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}' -replace '^v',''
          wix build installer/wix/Product.wxs installer/wix/Components.wxs `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Util.wixext `
            -d Version=$version `
            -arch x64 `
            -b installer/wix `
            -pdbtype none `
            -o "MSCPlugins-$version-Setup.msi"

      - name: Collect release files
        shell: pwsh
        run: |
          $names = '${{ needs.setup.outputs.names }}' | ConvertFrom-Json
          foreach ($name in $names) {
            Copy-Item "artifacts\$name\*.zip" -Destination .
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: |
            *-${{ github.ref_name }}.zip
            MSCPlugins-*-Setup.msi
          generate_release_notes: true
