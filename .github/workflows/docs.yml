name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml

# Least privilege: read-only by default; the deploy job elevates to write.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # gh-deploy pushes the built site to the gh-pages branch.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      # Hash-pinned install (Scorecard Pinned-Dependencies). Regenerate with:
      #   pip-compile --generate-hashes docs/requirements.in
      - run: pip install --require-hashes -r docs/requirements.txt

      - run: mkdocs gh-deploy --force
