name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly, Monday 07:20 UTC
    - cron: '20 7 * * 1'
  push:
    branches: [ "main" ]

# Least privilege by default; the job below elevates only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload results to the code-scanning dashboard.
      security-events: write
      # Needed to publish results so the public badge / scorecard.dev works.
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to the OpenSSF REST API so the badge resolves.
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
